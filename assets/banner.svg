<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="420" y1="0" x2="420" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="780" y1="0" x2="780" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1020" y1="0" x2="1020" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1140" y1="0" x2="1140" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="300" cy="200" r="120" fill="#7c3aed" opacity="0.08" filter="url(#blur)"/>
  <circle cx="900" cy="200" r="100" fill="#2563eb" opacity="0.06" filter="url(#blur)"/>

  <!-- Lens icon -->
  <g transform="translate(140, 140)">
    <circle cx="60" cy="60" r="45" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.9"/>
    <line x1="92" y1="92" x2="120" y2="120" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <circle cx="60" cy="60" r="25" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
    <!-- Scan lines -->
    <line x1="40" y1="55" x2="80" y2="55" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <line x1="45" y1="65" x2="75" y2="65" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="75" x2="70" y2="75" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="320" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-1">
    RepoLens
  </text>
  <text x="680" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="url(#glow)" letter-spacing="-1">
    AI
  </text>

  <!-- Tagline -->
  <text x="320" y="215" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#8b949e" letter-spacing="0.5">
    AI-powered GitHub repository auditor
  </text>

  <!-- Score badges -->
  <g transform="translate(320, 250)">
    <!-- Doc score -->
    <g>
      <rect x="0" y="0" width="120" height="36" rx="8" fill="#238636" opacity="0.15"/>
      <rect x="0" y="0" width="120" height="36" rx="8" fill="none" stroke="#238636" stroke-width="1" opacity="0.4"/>
      <text x="14" y="23" font-family="monospace" font-size="13" fill="#3fb950">Docs: 85</text>
    </g>
    <!-- Structure score -->
    <g transform="translate(135, 0)">
      <rect x="0" y="0" width="130" height="36" rx="8" fill="#9e6a03" opacity="0.15"/>
      <rect x="0" y="0" width="130" height="36" rx="8" fill="none" stroke="#9e6a03" stroke-width="1" opacity="0.4"/>
      <text x="14" y="23" font-family="monospace" font-size="13" fill="#d29922">Struct: 72</text>
    </g>
    <!-- Maintain score -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="130" height="36" rx="8" fill="#1f6feb" opacity="0.15"/>
      <rect x="0" y="0" width="130" height="36" rx="8" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.4"/>
      <text x="14" y="23" font-family="monospace" font-size="13" fill="#58a6ff">Maint: 90</text>
    </g>
    <!-- Overall score -->
    <g transform="translate(425, 0)">
      <rect x="0" y="0" width="130" height="36" rx="8" fill="#7c3aed" opacity="0.15"/>
      <rect x="0" y="0" width="130" height="36" rx="8" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
      <text x="14" y="23" font-family="monospace" font-size="13" fill="#a78bfa">Total: 82</text>
    </g>
  </g>

  <!-- Tech stack pills -->
  <g transform="translate(320, 310)">
    <rect x="0" y="0" width="75" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <rect x="0" y="0" width="75" height="26" rx="13" fill="none" stroke="#1f6feb" stroke-width="0.8" opacity="0.4"/>
    <text x="14" y="17" font-family="monospace" font-size="11" fill="#58a6ff">Python</text>

    <rect x="85" y="0" width="95" height="26" rx="13" fill="#238636" opacity="0.2"/>
    <rect x="85" y="0" width="95" height="26" rx="13" fill="none" stroke="#238636" stroke-width="0.8" opacity="0.4"/>
    <text x="99" y="17" font-family="monospace" font-size="11" fill="#3fb950">FastAPI</text>

    <rect x="190" y="0" width="95" height="26" rx="13" fill="#da3633" opacity="0.2"/>
    <rect x="190" y="0" width="95" height="26" rx="13" fill="none" stroke="#da3633" stroke-width="0.8" opacity="0.4"/>
    <text x="204" y="17" font-family="monospace" font-size="11" fill="#f85149">Docker</text>

    <rect x="295" y="0" width="120" height="26" rx="13" fill="#8957e5" opacity="0.2"/>
    <rect x="295" y="0" width="120" height="26" rx="13" fill="none" stroke="#8957e5" stroke-width="0.8" opacity="0.4"/>
    <text x="309" y="17" font-family="monospace" font-size="11" fill="#bc8cff">GH Actions</text>

    <rect x="425" y="0" width="85" height="26" rx="13" fill="#bf8700" opacity="0.2"/>
    <rect x="425" y="0" width="85" height="26" rx="13" fill="none" stroke="#bf8700" stroke-width="0.8" opacity="0.4"/>
    <text x="439" y="17" font-family="monospace" font-size="11" fill="#e3b341">Streamlit</text>
  </g>

  <!-- Right side: mini code block -->
  <g transform="translate(850, 100)">
    <rect x="0" y="0" width="300" height="220" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="300" height="32" rx="8" fill="#21262d"/>
    <rect x="0" y="16" width="300" height="16" fill="#21262d"/>
    <circle cx="16" cy="16" r="5" fill="#f85149" opacity="0.8"/>
    <circle cx="32" cy="16" r="5" fill="#d29922" opacity="0.8"/>
    <circle cx="48" cy="16" r="5" fill="#3fb950" opacity="0.8"/>
    <text x="120" y="20" font-family="monospace" font-size="11" fill="#8b949e">analysis.py</text>

    <!-- Code lines -->
    <g transform="translate(12, 48)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#ff7b72">def</text>
      <text x="30" y="0" font-family="monospace" font-size="12" fill="#d2a8ff">analyze_repo</text>
      <text x="140" y="0" font-family="monospace" font-size="12" fill="#c9d1d9">(url):</text>

      <text x="16" y="22" font-family="monospace" font-size="12" fill="#c9d1d9">repo = </text>
      <text x="62" y="22" font-family="monospace" font-size="12" fill="#79c0ff">fetch</text>
      <text x="94" y="22" font-family="monospace" font-size="12" fill="#c9d1d9">(url)</text>

      <text x="16" y="44" font-family="monospace" font-size="12" fill="#c9d1d9">score = </text>
      <text x="70" y="44" font-family="monospace" font-size="12" fill="#79c0ff">audit</text>
      <text x="100" y="44" font-family="monospace" font-size="12" fill="#c9d1d9">(repo)</text>

      <text x="16" y="66" font-family="monospace" font-size="12" fill="#c9d1d9">report = </text>
      <text x="78" y="66" font-family="monospace" font-size="12" fill="#79c0ff">generate</text>
      <text x="140" y="66" font-family="monospace" font-size="12" fill="#c9d1d9">(score)</text>

      <text x="16" y="88" font-family="monospace" font-size="12" fill="#ff7b72">return</text>
      <text x="62" y="88" font-family="monospace" font-size="12" fill="#c9d1d9"> report</text>

      <text x="0" y="120" font-family="monospace" font-size="12" fill="#8b949e"># Output:</text>
      <text x="0" y="142" font-family="monospace" font-size="12" fill="#3fb950"># Docs:     85/100</text>
      <text x="0" y="164" font-family="monospace" font-size="12" fill="#d29922"># Struct:   72/100</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
