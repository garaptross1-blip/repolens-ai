name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "from src.github_fetcher import fetch_repo_files; from src.analyzer import detect_stack; from src.scoring import calculate_composite_scores; from src.ai_engine import build_analysis_prompt; from src.report_builder import build_full_report; print('All imports OK')"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          python -c "
          from src.github_fetcher import parse_github_url
          owner, repo = parse_github_url('https://github.com/fastapi/fastapi')
          assert owner == 'fastapi'
          assert repo == 'fastapi'
          print('URL parsing OK')

          from src.analyzer import analyze_readme
          result = analyze_readme('# My Project\n\nInstall with pip install myproject\n\n## Usage\n\nRun the app.\n\n## License\n\nMIT')
          assert result['score'] > 0
          print(f'README analysis OK: {result[\"score\"]}/100')

          from src.scoring import get_score_grade, get_score_emoji
          assert get_score_grade(85) == 'A'
          assert get_score_grade(45) == 'D'
          assert get_score_emoji(90) == '🟢'
          print('Scoring OK')

          print('All smoke tests passed')
          "
